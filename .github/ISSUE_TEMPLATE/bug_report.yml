name: Bug report
description: Report a reproducible defect in simple.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. This is a research simulator; include a minimal reproducible example.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-paragraph description of the defect.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Commands or script that demonstrate the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and dependency versions.
  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues.
          required: true
        - label: I am reporting a defect, not asking for trading advice.
          required: true
