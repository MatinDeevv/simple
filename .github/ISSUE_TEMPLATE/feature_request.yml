name: Feature request
description: Propose an enhancement to simple.
title: "[feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: Describe how the idea fits the causality-first research mission.
  - type: textarea
    id: problem
    attributes:
      label: Problem or gap
      description: What research question or workflow is underserved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Concrete description of the enhancement.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Research impact
      description: Which research pipeline is affected?
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues.
          required: true
        - label: This does not introduce look-ahead or data leakage.
          required: true
