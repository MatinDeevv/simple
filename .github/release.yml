changelog:
  exclude:
    labels:
      - ignore-for-release
      - internal
  categories:
    - title: Breaking changes
      labels:
        - breaking-change
    - title: New features
      labels:
        - enhancement
        - feature
    - title: Classical dynamics
      labels:
        - classical
        - dynamics
        - integrator
        - coupling
    - title: Quantum archive
      labels:
        - quantum
    - title: Bug fixes
      labels:
        - bug
    - title: Documentation
      labels:
        - documentation
    - title: Maintenance
      labels:
        - dependencies
        - ci
        - refactor
