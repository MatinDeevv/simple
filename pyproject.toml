[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "fxresearch"
version = "0.1.0"
description = "Causality-first FX dynamics research platform"
requires-python = ">=3.11"

[tool.setuptools.packages.find]
where = ["."]
include = ["fxresearch*", "research*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
